name: Redeploy site

# When notes are pushed, ping the Homepage repo so it rebuilds and redeploys
# the website with the latest published notes.
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homepage deploy
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.HOMEPAGE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ronchuxia/Homepage/dispatches \
            -d '{"event_type":"notes-updated"}'
